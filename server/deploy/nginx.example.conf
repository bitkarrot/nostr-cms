# nostr-cms email service — nginx location snippet (D-02, D-03)
#
# Copy this `location /api/email/ { ... }` block into your existing nginx
# `server { }` block (the one that serves the nostr-cms SPA and proxies
# /api/ to swarm). Substitute ${EMAIL_PORT} with the port your email service
# listens on (default 3001, set via the EMAIL_PORT env var in email.env).
#
# Routing: nginx longest-prefix-match means `location /api/email/` wins over
# a broader `location /api/` (swarm), so /api/email/* -> Node service and
# everything else under /api/ -> swarm. No swarm config change is needed.
#
# Hardening (D-03):
#   - client_max_body_size 10m  — covers future Phase 4 CSV subscriber uploads
#     so installers don't revisit nginx later.
#   - proxy_read_timeout 60s   — covers slow admin operations.
#   - Standard forwarded headers (Host, X-Real-IP, X-Forwarded-For,
#     X-Forwarded-Proto, X-Forwarded-Host) so the email service can
#     reconstruct the public URL for NIP-98 verification (T-01-03).
#
# Deliberately omitted (D-03):
#   - No nginx-level rate limiting — rate limiting is server-side token bucket
#     (Phase 5).
#   - No WebSocket upgrade headers (proxy_set_header Upgrade / Connection
#     "upgrade") — the email API is HTTP-only.

location /api/email/ {
    proxy_pass http://127.0.0.1:${EMAIL_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    client_max_body_size 10m;     # covers future Phase 4 CSV uploads
    proxy_read_timeout 60s;       # covers slow admin operations
}
